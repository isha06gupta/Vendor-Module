<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEIL Employee Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

<header>
  <a href="index.html"><img src="logo.jpeg" class="logo" alt="Logo" /></a>
  <nav>
    <div class="nav-item"><a href="index.html">Home</a></div>
    <div class="nav-item">
      <a href="#">About CEIL</a>
      <div class="dropdown">
        <a href="#">Company Profile</a>
        <a href="#">Vision and Mission</a>
        <a href="#">Our Leaders</a>
        <a href="#">Parent Company EIL</a>
      </div>
    </div>
  </nav>
</header>

<section class="employee-login-section">
  <div class="employee-login-container">
    <div class="employee-login-box">
      <div class="employee-login-header">
        <h2>CEIL Employee Login</h2>
        <p>Active Directory Authentication</p>
      </div>
      
      <form id="employeeLoginForm">
        <div class="input-group">
          <label for="employeeId">Employee ID</label>
          <input type="text" id="employeeId" name="employeeId" placeholder="Enter your Employee ID" required />
        </div>
        
        <div class="input-group">
          <label for="employeePassword">Password</label>
          <input type="password" id="employeePassword" name="password" placeholder="Enter your Password" required />
        </div>
        
        <button type="submit" class="employee-login-btn">
          <i class="fas fa-sign-in-alt"></i>
          Login
        </button>
      </form>
      
      <div class="employee-login-footer">
        <p><a href="index.html">← Back to Main Site</a></p>
        <p class="demo-credentials">
          <strong>Demo Credentials:</strong><br>
          CEO: ceo001 / ceo123<br>
          Admin: admin001 / admin123<br>
          Coordinator: coord001 / coord123<br>
          Engineer: eng001 / eng123
        </p>
      </div>
    </div>
  </div>
</section>

<script src="ceil-employee-auth.js"></script>
</body>
</html>
