<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CEIL Vendor Portal</title>
  <link rel="stylesheet" href="details.css" />
</head>
<body>

  <!-- Header Navigation -->
  <header class="header">
    <div class="logo-container">
      <img src="logo.jpeg" alt="CEIL Logo" class="ceil-logo" />
    </div>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html" class="active">HOME</a></li>
        <li><a href="#">ABOUT CEIL</a></li>
        <li><a href="#">BUSINESS SECTORS</a></li>
        <li><a href="#">SERVICES</a></li>
        <li><a href="#">SUSTAINABILITY</a></li>
        <li><a href="#">FINANCIAL</a></li>
        <li><a href="#">CAREERS</a></li>
        <li><a href="#">CONTACT US</a></li>
        <li><a href="#">NEWS & EVENTS</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Form Section -->
  <div class="content-wrapper">
    <div class="form-section">
      <div class="registration-form-container">
        <h1>Vendor Registration</h1>

        <form id="vendorForm">
          <div class="form-group">
            <label for="name">Vendor Name:</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required />
          </div>

          <div class="form-group">
            <label for="contact_person">Contact Person:</label>
            <input type="text" id="contact_person" name="contact_person" />
          </div>

          <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" />
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />
          </div>

          <div class="form-group">
            <label for="address">Address:</label>
            <textarea id="address" name="address"></textarea>
          </div>

          <div class="form-group">
            <label for="gstin">GSTIN:</label>
            <input type="text" id="gstin" name="gstin" />
          </div>

          <div class="form-group">
            <label>Are you registered as MSME?</label>
            <label><input type="radio" name="is_msme" value="Yes" required /> Yes</label>
            <label><input type="radio" name="is_msme" value="No" /> No</label>
          </div>

          <!-- Buttons -->
          <div class="button-row">
            <button type="submit" id="submitBtn">Register</button>
            <button type="button" id="nextBtn">Next</button>
          </div>
        </form>

        <!-- Response Message -->
        <div class="response" id="response"></div>
      </div>
    </div>
  </div>

  <!-- JS Script -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const vendorId = localStorage.getItem('currentVendorId');
      if (!vendorId) {
        alert("Please log in first.");
        window.location.href = "index.html";
      }
    });

    document.getElementById('vendorForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const form = e.target;
      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => {
        data[key] = value;
      });

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = "Registering...";

      try {
        // Change the URL if your backend runs on a different port or path
        const response = await fetch('http://localhost:9090/api/vendor/personal-info', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const responseData = await response.json();

        if (!response.ok) {
          throw new Error(responseData.message || 'Something went wrong during registration');
        }

        document.getElementById('response').textContent = '✅ Registration successful! Please proceed to document upload.';
        document.getElementById('response').style.color = 'green';
        form.reset();

        // Save vendor id if returned by backend
        if (responseData.id) {
          localStorage.setItem('currentVendorId', responseData.id);
        }

        setTimeout(() => {
          window.location.href = 'documents.html';
        }, 1500);

      } catch (error) {
        document.getElementById('response').textContent = '❌ Error: ' + error.message;
        document.getElementById('response').style.color = 'red';
        console.error('Registration error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Register";
      }
    });

    // "Next" button handler
    document.getElementById('nextBtn').addEventListener('click', function () {
      const currentVendorId = localStorage.getItem('currentVendorId');
      if (currentVendorId) {
        window.location.href = 'docupload.html';
      } else {
        alert('Please complete registration first.');
      }
    });
  </script>
</body>
</html>
