spring.application.name=vendorportal

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/vendor_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root  # <-- REPLACE WITH YOUR MYSQL USERNAME
spring.datasource.password=sanctuary321@  # <-- REPLACE WITH YOUR MYSQL PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Properties for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect # Correct dialect for MySQL 8.x
spring.jpa.hibernate.ddl-auto=update # 'update' will create/update schema; 'create' will drop and recreate on each run
spring.jpa.show-sql=true # Show SQL queries in console

# File Upload Configuration
file.upload-dir=./uploads